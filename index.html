<!DOCTYPE html>
<html>

<head>
    <title>Login System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <script src="script.js"></script>

</head>

<body>

    <div data-role="page" id="page1">

        <div data-role="header" data-theme="b">
            <h1>Login Page</h1>
        </div>

        <div role="main" class="ui-content">

            <form id="loginForm">

                <label for="username">Username</label>
                <input type="text" id="username">

                <label for="password">Password</label>
                <input type="password" id="password">

                <button type="button" id="loginBtn" class="ui-btn ui-btn-b ui-corner-all">
                    Login
                </button>

            </form>

        </div>

        <div data-role="footer" data-theme="b">
            <h4>jQuery Mobile Login</h4>
        </div>

    
        <div data-role="popup" id="popupLogin" data-theme="a">

            <div data-role="header">
                <h1>Perhatian</h1>
            </div>

            <div role="main" class="ui-content">
                <p>Sila isi username & password</p>
                <a href="#" data-rel="back" class="ui-btn ui-btn-b ui-corner-all">
                    OK
                </a>
            </div>

        </div>

    </div>

    <div data-role="page" id="page2">

        <div data-role="header" data-theme="b">
            <h1>Info Page</h1>
        </div>

        <div role="main" class="ui-content">

            <h2>Login Berjaya</h2>

            <p>Selamat datang ke sistem.</p>

            <a href="#page1" class="ui-btn ui-btn-inline ui-btn-b">
                Logout
            </a>

        </div>

        <div data-role="footer" data-theme="b">
            <h4>Welcome User</h4>
        </div>

    </div>

</body>

</html>
